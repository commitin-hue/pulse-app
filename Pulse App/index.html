// ─── STREAK ────────────────────────────────────────────────────
const getTodayStr = () => new Date().toISOString().split('T')[0];

function calcStreak(dates) {
  if (!dates?.length) return 0;
  const u = [...new Set(dates)].sort().reverse();
  const today = getTodayStr();
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (u[0] !== today && u[0] !== yesterday) return 0;
  let streak = 1;
  for (let i = 1; i < u.length; i++) {
    const d = new Date(u[0]); d.setDate(d.getDate() - i);
    if (u[i] === d.toISOString().split('T')[0]) streak++; else break;
  }
  return streak;
}

// ─── NATURAL LANGUAGE PARSER ───────────────────────────────────
const CONTEXTS = ['commute','at home','daytime','anywhere','evening','tonight','morning','quiet time','eating out','walk'];
const CATEGORIES = ['active','creative','todo','life'];

function parseChat(raw) {
  const text = raw.trim();
  const lower = text.toLowerCase();

  // DELETE / REMOVE
  if (/^(remove|delete|scratch|kill|done with|drop)\b/i.test(text)) {
    const query = text.replace(/^(remove|delete|scratch|kill|done with|drop)\s+/i, '').trim();
    return { type: 'delete', query };
  }

  // EXPLICIT ADD
  const addMatch = text.match(/^(?:add|new|\+|create|remind(?:er)? (?:me )?(?:to )?)\s*:?\s*/i);
  const body = addMatch ? text.slice(addMatch[0].length).trim() : text;
  return buildAdd(body);
}

function buildAdd(body) {
  const lower = body.toLowerCase();
  const timeMatch = body.match(/(\d+)\s*min(?:utes?)?/i);
  const mins = timeMatch ? timeMatch[1] : '10';
  const ctx = CONTEXTS.find(c => lower.includes(c)) || 'anywhere';
  const catMatch = lower.match(/\bto\s+(active|creative|todo|life)\b/) ||
                   lower.match(/\b(active|creative|todo|life)\b/);
  const category = catMatch ? catMatch[1] : 'todo';

  let action = body
    .replace(/\d+\s*min(?:utes?)?/ig, '')
    .replace(/\bto\s+(active|creative|todo|life)\b/ig, '')
    .replace(new RegExp(`\\b(${CONTEXTS.join('|')})\\b`, 'ig'), '')
    .replace(/[·\-–]+/g, ' ')
    .replace(/\s{2,}/g, ' ')
    .trim();
  if (!action) action = body.trim();
  action = action.charAt(0).toUpperCase() + action.slice(1).replace(/\.$/, '');

  return { type: 'add', action, time: `${mins} min · ${ctx}`, category };
}

// ─── DAILY RADAR PICKS ─────────────────────────────────────────
function getDailyPicks(checked, customTasks, deletedIds) {
  const seed = getTodayStr().replace(/-/g,'').split('').reduce((a,c,i)=>a+c.charCodeAt(0)*(i+1),0);
  const pick  = (pool, off) => pool.length ? pool[Math.abs(seed*(off+7)*1234567) % pool.length] : null;

  const visible = (r) => !deletedIds.has(r.id) && !checked[r.id];

  const urgentUndone = THIS_WEEK.urgent.filter(visible);
  const redUndone    = ["active","creative","todo","life"].flatMap(t =>
    BACKLOG[t].items.filter(i => i.badgeColor === "#FF3D3D").flatMap(i => i.reps)
  ).filter(visible);
  const orangeUndone = ["active","creative","todo","life"].flatMap(t =>
    BACKLOG[t].items.filter(i => i.badgeColor === "#FF6D00").flatMap(i => i.reps)
  ).filter(visible);
  const customUndone = customTasks.filter(t => !checked[t.id] && !deletedIds.has(t.id));
  const restUndone   = BUILTIN_REPS.filter(r =>
    visible(r) &&
    !redUndone.find(x => x.id === r.id) &&
    !orangeUndone.find(x => x.id === r.id)
  );

  const picks = []; const used = new Set();
  const add = (pool, off) => {
    if (picks.length >= 5 || !pool.length) return;
    const p = pick(pool, off);
    if (p && !used.has(p.id)) { picks.push(p); used.add(p.id); }
  };

  add(urgentUndone, 0); add(urgentUndone, 1);
  add(redUndone, 2);
  if (customUndone.length) add(customUndone, 3);
  add(orangeUndone, 4);
  for (let i = 5; picks.length < 5; i++) { add(restUndone, i); if (i > 30) break; }
  return picks.filter(Boolean);
}

}

      <div style={{ flex: 1, cursor: "pointer" }} onClick={(e) => onToggle(e, rep.id)}>

        </div>
        <div style={{ fontSize: 9, color: "#3a3a3a", marginTop: 3 }}>⏱ {rep.time}</div>
      </div>
      <div style={{ display: "flex", gap: 5 }}>
        {!isDone && (
          <button onClick={(e) => { e.stopPropagation(); onFocus(rep); }} style={{
            background: isActive ? S.yellow : "transparent",
            border: `1px solid ${isActive ? S.yellow : "#2a2a2a"}`,
            color: isActive ? "#000" : "#444",
            borderRadius: 5, padding: "3px 7px", fontSize: 9, cursor: "pointer", transition: "all 0.15s",
          }}>{isActive ? "▶" : "⏱"}</button>
        )}
        {onDelete && (
          <button onClick={(e) => { e.stopPropagation(); onDelete(rep.id); }} style={{

// ─── CHAT DRAWER ───────────────────────────────────────────────
function ChatDrawer({ open, onClose, customTasks, setCustomTasks, deletedIds, setDeletedIds, checked }) {
  const [input,      setInput]      = useState('');
  const [history,    setHistory]    = useState([]);
  const [bottomOff,  setBottomOff]  = useState(0);
  const [viewportH,  setViewportH]  = useState(window.innerHeight);
  const inputRef  = useRef(null);
  const histRef   = useRef(null);

  // Lift drawer above iOS keyboard using visualViewport API
  useEffect(() => {
    if (!open) { setBottomOff(0); setViewportH(window.innerHeight); return; }
    const vv = window.visualViewport;
    if (!vv) return;
    const update = () => {
      const kbH = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      setBottomOff(kbH);
      setViewportH(vv.height);
    };
    vv.addEventListener('resize', update);
    vv.addEventListener('scroll', update);
    update();
    return () => { vv.removeEventListener('resize', update); vv.removeEventListener('scroll', update); };
  }, [open]);

  useEffect(() => {
    if (histRef.current) histRef.current.scrollTop = histRef.current.scrollHeight;
  }, [history]);

  const findAndDelete = (query) => {
    const q = query.toLowerCase();
    const cm = customTasks.find(t => t.action.toLowerCase().includes(q));
    if (cm) {
      const next = customTasks.filter(t => t.id !== cm.id);
      setCustomTasks(next); ls.set(CUSTOM_KEY, next);
      return { found: true, label: cm.action };
    }
    const bm = BUILTIN_REPS.concat(WEEK_REPS).find(r => r.action.toLowerCase().includes(q));
    if (bm) {
      const next = new Set([...deletedIds, bm.id]);
      setDeletedIds(next); ls.set(DELETED_KEY, [...next]);
      return { found: true, label: bm.action };
    }
    const items = ["active","creative","todo","life"].flatMap(t => BACKLOG[t].items);
    const im = items.find(i => i.name.toLowerCase().includes(q));
    if (im) {
      const ids = im.reps.map(r => r.id);
      const next = new Set([...deletedIds, ...ids]);
      setDeletedIds(next); ls.set(DELETED_KEY, [...next]);
      return { found: true, label: `${im.name} (${ids.length} tasks)` };
    }
    return { found: false };
  };

  const submit = () => {
    const text = input.trim();
    if (!text) return;
    setHistory(h => [...h, { role: 'user', text }]);
    setInput('');
    const parsed = parseChat(text);
    let reply = '';
    if (parsed.type === 'add') {
      const newTask = { id: `custom-${Date.now()}`, action: parsed.action, time: parsed.time, category: parsed.category, created: getTodayStr() };
      const next = [...customTasks, newTask];
      setCustomTasks(next); ls.set(CUSTOM_KEY, next);
      reply = `✓ Added to ${parsed.category}:\n"${parsed.action}"\n${parsed.time}`;
    } else if (parsed.type === 'delete') {
      const result = findAndDelete(parsed.query);
      reply = result.found ? `✓ Removed: "${result.label}"` : `Couldn't find "${parsed.query}" — try part of the task name`;
    } else {
      reply = `Try:\n"add dentist · 10 min · daytime"\n"remove scuba"`;
    }
    setTimeout(() => setHistory(h => [...h, { role: 'bot', text: reply }]), 150);
  };

  const onKey = (e) => { if (e.key === 'Enter') { e.preventDefault(); submit(); } };

  if (!open) return null;

  const examples = [
    "add book dentist · 10 min · daytime",
    "add reply to Honda HR · tonight",
    "remove scuba",
    "delete loans",
  ];

  return (
    <>
      {/* Backdrop */}
      <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.65)", zIndex: 300 }} />

      {/* Drawer — rises above keyboard via bottomOff */}
      <div className="drawer-enter" style={{
        position: "fixed",
        bottom: bottomOff,
        left: "50%", transform: "translateX(-50%)",
        width: "100%", maxWidth: 500,
        background: "#161616",
        borderRadius: bottomOff > 0 ? "16px 16px 0 0" : "20px 20px 0 0",
        zIndex: 310,
        paddingBottom: bottomOff > 0 ? 6 : "env(safe-area-inset-bottom)",
        maxHeight: bottomOff > 0 ? `${viewportH - 8}px` : "62vh",
        display: "flex", flexDirection: "column",
        transition: "bottom 0.15s ease-out, max-height 0.15s ease-out",
        boxShadow: "0 -8px 40px rgba(0,0,0,0.6)",
      }}>
        {/* Handle */}
        <div style={{ padding: "10px 16px 8px", borderBottom: `1px solid #222` }}>
          <div style={{ width: 40, height: 4, borderRadius: 2, background: "#333", margin: "0 auto 10px" }} />
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontFamily: "Unbounded, sans-serif", fontSize: 10, fontWeight: 700, color: S.yellow, letterSpacing: "0.1em" }}>TASK CHAT</div>
              <div style={{ fontSize: 10, color: "#666", marginTop: 2 }}>Type to add or remove tasks</div>
            </div>
            <button onClick={onClose} style={{ background: "#222", border: "none", color: "#666", borderRadius: 8, width: 30, height: 30, fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
          </div>
        </div>

        {/* History */}
        <div ref={histRef} style={{ flex: 1, overflowY: "auto", padding: "10px 14px", display: "flex", flexDirection: "column", gap: 8, minHeight: 0 }}>
          {history.length === 0 && (
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <div style={{ fontSize: 10, color: "#555", marginBottom: 2 }}>Tap an example or type below:</div>
              {examples.map((ex, i) => (
                <div key={i} onClick={() => { setInput(ex); inputRef.current?.focus(); }} style={{
                  fontSize: 12, color: "#888", background: "#1e1e1e",
                  border: `1px solid #2a2a2a`, borderRadius: 10, padding: "9px 12px",
                  cursor: "pointer", lineHeight: 1.4,
                }}>{ex}</div>
              ))}
            </div>
          )}
          {history.map((msg, i) => (
            <div key={i} style={{
              alignSelf: msg.role === 'user' ? 'flex-end' : 'flex-start',
              background: msg.role === 'user' ? S.yellow : "#1e1e1e",
              color: msg.role === 'user' ? '#000' : S.text,
              border: `1px solid ${msg.role === 'user' ? S.yellow : '#2a2a2a'}`,
              borderRadius: msg.role === 'user' ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
              padding: "9px 13px", fontSize: 13, maxWidth: "88%",
              whiteSpace: "pre-wrap", lineHeight: 1.5,
            }}>{msg.text}</div>
          ))}
        </div>

        {/* Input bar — always visible, high contrast */}
        <div style={{
          padding: "10px 12px",
          borderTop: `1px solid #242424`,
          background: "#1a1a1a",
          display: "flex", gap: 8, alignItems: "center",
        }}>
          <input
            ref={inputRef}
            type="text"
            inputMode="text"
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={onKey}
            placeholder="add dentist 10 min daytime…"
            style={{
              flex: 1,
              background: "#242424",
              border: `1.5px solid #383838`,
              borderRadius: 12,
              padding: "13px 14px",
              fontSize: 16,
              color: "#F0EDE8",
              outline: "none",
              minWidth: 0,
              // fontSize ≥16px prevents iOS Safari from auto-zooming on focus
              WebkitAppearance: "none",
            }}
          />
          <button
            onClick={submit}
            style={{
              background: S.yellow,
              border: "none",
              color: "#000",
              borderRadius: 12,
              width: 48, height: 48,
              fontSize: 20, fontWeight: 900,
              cursor: "pointer",
              flexShrink: 0,
              display: "flex", alignItems: "center", justifyContent: "center",
            }}
          >↑</button>
        </div>
      </div>
    </>
  );
}

// ─── MAIN APP ──────────────────────────────────────────────────
const TABS       = ["radar","week","active","creative","todo","life"];
const TAB_LABELS = { radar:"📡 Radar", week:"⚡ Week", active:"🔥 Active", creative:"🎨 Creative", todo:"✅ To-Do", life:"🌱 Life" };

function App() {
  const [tab,           setTab]          = useState("radar");
  const [checked,       setChecked]      = useState({});
  const [open,          setOpen]         = useState({});
  const [streakDates,   setStreakDates]  = useState([]);
  const [customTasks,   setCustomTasks]  = useState([]);
  const [deletedIds,    setDeletedIds]   = useState(new Set());
  const [saveStatus,    setSaveStatus]   = useState("idle");
  const [focusTask,     setFocusTask]    = useState(null);
  const [focusRunning,  setFocusRunning] = useState(false);
  const [focusTime,     setFocusTime]    = useState(25*60);
  const [chatOpen,      setChatOpen]     = useState(false);
  const [suggestions,   setSuggestions]  = useState([]);
  const [briefingOpen,  setBriefingOpen] = useState(false);
  const timerRef = useRef(null);

  // Fetch latest suggestions from Gist. Pass forceAll=true to show all (not just unseen).
  const fetchBriefing = useCallback((forceAll) => {
    if (forceAll) ls.set(SEEN_SUG_KEY, []);
    fetch('https://gist.githubusercontent.com/commitin-hue/a44d5b59aac3756ce47fe39359ba179f/raw/pulse-suggestions.json?t=' + Date.now())
      .then(r => r.ok ? r.json() : null)
      .catch(() => null)
      .then(data => {
        if (!data?.suggestions?.length) return;
        const seen = ls.get(SEEN_SUG_KEY, []);
        const fresh = data.suggestions.filter(s => !seen.includes(s.id));
        if (fresh.length) {
          setSuggestions(fresh);
          setBriefingOpen(true);
        }
      });
  }, []);

  // Load all persisted state
  useEffect(() => {
    const d    = ls.get(STORAGE_KEY, {});
    const sk   = ls.get(STREAK_KEY, { dates: [] });
    const ct   = ls.get(CUSTOM_KEY, []);
    const del  = ls.get(DELETED_KEY, []);
    setChecked(d.checked || {});
    setOpen(d.open || {});
    setStreakDates(sk.dates || []);
    setCustomTasks(ct);
    setDeletedIds(new Set(del));

    // Morning briefing: fetch suggestions from GitHub Gist (always latest)
    fetchBriefing(false);
  }, []);

  // Timer
  useEffect(() => {
    if (focusRunning) {
      timerRef.current = setInterval(() => {
        setFocusTime(t => { if (t <= 1) { setFocusRunning(false); clearInterval(timerRef.current); return 25*60; } return t-1; });
      }, 1000);
    } else clearInterval(timerRef.current);
    return () => clearInterval(timerRef.current);
  }, [focusRunning]);

  const persist = useCallback((c, o) => {
    ls.set(STORAGE_KEY, { checked: c, open: o });
    setSaveStatus("saved");
    if (persist._t) clearTimeout(persist._t);
    persist._t = setTimeout(() => setSaveStatus("idle"), 1400);
  }, []);

  const toggleRep = useCallback((e, id) => {
    e?.stopPropagation();
    const next = { ...checked, [id]: !checked[id] };
    setChecked(next);
    if (next[id]) {
      const today = getTodayStr();
      if (!streakDates.includes(today)) {
        const nd = [...streakDates, today];
        setStreakDates(nd);
        ls.set(STREAK_KEY, { dates: nd });
      }
    }
    persist(next, open);
  }, [checked, open, streakDates, persist]);

  const toggleCard = useCallback((id) => {
    const next = { ...open, [id]: !open[id] };
    setOpen(next); persist(checked, next);
  }, [checked, open, persist]);

  const handleFocus = useCallback((rep) => {
    if (focusTask?.id === rep.id) { setFocusTask(null); setFocusRunning(false); setFocusTime(25*60); }
    else { setFocusTask(rep); setFocusTime(25*60); setFocusRunning(true); }
  }, [focusTask]);

  const deleteCustom = useCallback((id) => {
    const next = customTasks.filter(t => t.id !== id);
    setCustomTasks(next); ls.set(CUSTOM_KEY, next);
  }, [customTasks]);

  const deleteBuiltin = useCallback((id) => {
    const next = new Set([...deletedIds, id]);
    setDeletedIds(next); ls.set(DELETED_KEY, [...next]);
  }, [deletedIds]);

  const acceptSuggestion = (s) => {
    const newTask = { id: `sug-${s.id}`, action: s.action, time: s.time || "10 min · anywhere", category: s.category || "todo", created: getTodayStr() };
    const next = [...customTasks, newTask];
    setCustomTasks(next); ls.set(CUSTOM_KEY, next);
    markSeen(s.id);
  };

  const markSeen = (id) => {
    const seen = ls.get(SEEN_SUG_KEY, []);
    ls.set(SEEN_SUG_KEY, [...seen, id]);
  };

  const dismissAll = () => {
    suggestions.forEach(s => markSeen(s.id));
    setBriefingOpen(false);
  };

  const streak    = calcStreak(streakDates);
  const allReps   = [...BUILTIN_REPS, ...customTasks].filter(r => !deletedIds.has(r.id));
  const weekDone  = WEEK_REPS.filter(r => !deletedIds.has(r.id) && checked[r.id]).length;
  const totalDone = allReps.filter(r => checked[r.id]).length;
  const pct       = allReps.length ? Math.round((totalDone / allReps.length) * 100) : 0;
  const focusPadTop = focusTask ? "calc(58px + env(safe-area-inset-top))" : 0;

  return (
    <div style={{ background: S.bg, minHeight: "100vh", color: S.text, fontFamily: "system-ui, -apple-system, sans-serif", maxWidth: 500, margin: "0 auto", paddingBottom: "calc(90px + env(safe-area-inset-bottom))", paddingTop: focusPadTop }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&display=swap');
      `}</style>

      {/* Morning Briefing */}
      {briefingOpen && suggestions.length > 0 && (
        <MorningBriefing suggestions={suggestions} onAccept={acceptSuggestion} onDismissAll={dismissAll} />
      )}

      {/* Focus bar */}
      {focusTask && (
        <FocusBar task={focusTask} timeLeft={focusTime} running={focusRunning}
          onToggle={() => setFocusRunning(r => !r)}
          onStop={() => { setFocusTask(null); setFocusRunning(false); setFocusTime(25*60); }}
        />
      )}

      {/* Header */}
      <div style={{ padding: "22px 18px 14px", paddingTop: focusTask ? "22px" : "calc(22px + env(safe-area-inset-top))", borderBottom: `1px solid ${S.border}` }}>
        <div style={{ fontFamily: "Unbounded, sans-serif", fontSize: 8, letterSpacing: "0.22em", color: S.muted, textTransform: "uppercase", marginBottom: 4 }}>Vlad / System OS</div>
        <div style={{ fontFamily: "Unbounded, sans-serif", fontSize: 21, fontWeight: 900 }}>1-REP <span style={{ color: S.yellow }}>BACKLOG</span></div>
        <div style={{ fontSize: 11, color: S.muted, marginTop: 6 }}>One action. 5–15 min. Pick one and move.</div>
      </div>

      {/* Stats */}
      <div style={{ display: "flex", borderBottom: `1px solid ${S.border}` }}>
        {[
          { v: `${weekDone}/${WEEK_REPS.filter(r => !deletedIds.has(r.id)).length}`, l: "Week",   c: S.yellow },
          { v: totalDone,                                                             l: "Done",   c: S.green  },
          { v: streak > 0 ? `🔥${streak}d` : "0d",                                  l: "Streak", c: S.orange },
          { v: `${pct}%`,                                                             l: "Overall", c: S.blue  },
        ].map((s, i) => (
          <div key={i} style={{ flex: 1, padding: "9px 4px", textAlign: "center", borderRight: i < 3 ? `1px solid ${S.border}` : "none" }}>
            <div style={{ fontFamily: "Unbounded, sans-serif", fontSize: 14, fontWeight: 700, color: s.c }}>{s.v}</div>
            <div style={{ fontSize: 7, letterSpacing: "0.12em", textTransform: "uppercase", color: S.muted, marginTop: 2 }}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* Save toast */}
      <div style={{ height: 20, display: "flex", alignItems: "center", padding: "0 16px" }}>
        {saveStatus === "saved" && <span style={{ fontSize: 9, color: S.green }}>✓ saved</span>}
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", borderBottom: `1px solid ${S.border}`, overflowX: "auto", padding: "0 6px" }}>
        {TABS.map(t => (
          <button key={t} className="tab-btn" onClick={() => setTab(t)} style={{
            padding: "10px 8px", fontSize: 9, fontFamily: "Unbounded, sans-serif",
            color: tab === t ? S.text : S.muted, background: "none", border: "none",
            borderBottom: tab === t ? `2px solid ${S.yellow}` : "2px solid transparent",
            cursor: "pointer", whiteSpace: "nowrap", transition: "color 0.15s",
          }}>{TAB_LABELS[t]}</button>
        ))}
      </div>

      {/* ── RADAR ── */}
      {tab === "radar" && (
        <RadarTab checked={checked} onToggle={toggleRep} streak={streak}
          focusId={focusTask?.id} onFocus={handleFocus}
          customTasks={customTasks} deletedIds={deletedIds}
          onDeleteCustom={deleteCustom}
        />
      )}

      {/* ── WEEK ── */}
      {tab === "week" && (
        <div style={{ padding: "14px 14px 0" }}>
          <SectionLabel color={S.muted} text={`📅 Calendar · ${THIS_WEEK.weekOf}`} />
          {THIS_WEEK.calendar.map(ev => (
            <div key={ev.id} onClick={(e) => toggleRep(e, ev.id)} className="rep-row" style={{
              display: "flex", alignItems: "center", gap: 10,
              padding: "9px 12px", marginBottom: 6,
              background: checked[ev.id] ? "#0a0a0a" : S.surface,
              border: `1px solid ${checked[ev.id] ? "#181818" : S.border}`,
              borderRadius: 9, cursor: "pointer", opacity: checked[ev.id] ? 0.45 : 1, transition: "all 0.15s",
            }}>
              <Checkbox isDone={!!checked[ev.id]} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 12, color: checked[ev.id] ? "#3a3a3a" : S.text, textDecoration: checked[ev.id] ? "line-through" : "none" }}>{ev.event}</div>
                <div style={{ fontSize: 9, color: S.muted, marginTop: 1 }}>{ev.day} · {ev.time}</div>
              </div>
            </div>
          ))}
          <SectionLabel color={S.red}    text="🔴 Urgent" />
          {THIS_WEEK.urgent.filter(r => !deletedIds.has(r.id)).map(r =>
            <RepRow key={r.id} rep={r} isDone={!!checked[r.id]} onToggle={toggleRep} onFocus={handleFocus} focusId={focusTask?.id} />)}
          <SectionLabel color={S.yellow} text="🟡 This Week" />
          {THIS_WEEK.thisweek.filter(r => !deletedIds.has(r.id)).map(r =>
            <RepRow key={r.id} rep={r} isDone={!!checked[r.id]} onToggle={toggleRep} onFocus={handleFocus} focusId={focusTask?.id} />)}
          <CustomTasksCard tasks={customTasks} tab="week" checked={checked} onToggle={toggleRep} onDelete={deleteCustom} focusId={focusTask?.id} onFocus={handleFocus} />
        </div>
      )}

      {/* ── BACKLOG TABS ── */}
      {["active","creative","todo","life"].includes(tab) && (
        <div style={{ padding: "14px 0 0" }}>
          {BACKLOG[tab].items.map(item => (
            <BacklogCard key={item.id} item={item} checked={checked} open={open}
              onToggle={toggleRep} onCard={toggleCard}
              focusId={focusTask?.id} onFocus={handleFocus}
              deletedIds={deletedIds}
            />
          ))}
          <CustomTasksCard tasks={customTasks} tab={tab} checked={checked} onToggle={toggleRep} onDelete={deleteCustom} focusId={focusTask?.id} onFocus={handleFocus} />
        </div>
      )}

      {/* ── FLOATING BUTTONS ── */}
      {/* Chat button */}
      <div className="chat-btn" onClick={() => setChatOpen(true)} style={{
        position: "fixed", bottom: "calc(18px + env(safe-area-inset-bottom))", left: 14,
        width: 46, height: 46, borderRadius: 23,
        background: S.surface, border: `1px solid ${S.border}`,
        display: "flex", alignItems: "center", justifyContent: "center",
        cursor: "pointer", fontSize: 20, transition: "transform 0.1s",
        boxShadow: "0 4px 18px rgba(0,0,0,0.4)",
      }}>💬</div>

      {/* Refresh FAB — re-fetches latest Gist suggestions */}
      <div className="fab" onClick={() => fetchBriefing(true)} style={{
        position: "fixed", bottom: "calc(18px + env(safe-area-inset-bottom))", right: 14,
        background: S.yellow, color: "#000", borderRadius: 50,
        padding: "9px 16px", fontFamily: "Unbounded, sans-serif", fontSize: 8, fontWeight: 700,
        letterSpacing: "0.06em", cursor: "pointer", boxShadow: "0 4px 18px rgba(255,214,0,0.18)",
        userSelect: "none", transition: "transform 0.1s",
      }}>↺ REFRESH</div>

      {/* Chat drawer */}
      <ChatDrawer
        open={chatOpen} onClose={() => setChatOpen(false)}
        customTasks={customTasks} setCustomTasks={setCustomTasks}
        deletedIds={deletedIds} setDeletedIds={setDeletedIds}
        checked={checked}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
